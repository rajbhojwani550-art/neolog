name: neolog
description: NICU Digital Companion for Neonatologists

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  go_router: ^12.0.0
  dio: ^5.3.0
  hive_flutter: ^1.1.0
  pdf: ^3.10.0
  printing: ^5.11.0
  fl_chart: ^0.65.0
  flutter_form_builder: ^9.1.0
  form_builder_validators: ^11.0.0
  intl: any
  shimmer: ^3.0.0
  flutter_slidable: ^3.0.0
  share_plus: ^7.2.0
  flutter_secure_storage: ^9.0.0
  uuid: ^4.2.1
  path_provider: ^2.1.0
  collection: ^1.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  hive_generator: ^2.0.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
